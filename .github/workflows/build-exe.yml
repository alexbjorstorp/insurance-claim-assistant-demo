name: Build Windows Demo EXE

on:
  push:
    branches: [main]
  workflow_dispatch:   # also allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (demo mode)
        working-directory: frontend
        run: npx vite build
        env:
          VITE_DEMO_MODE: 'true'

      - name: Copy React build into backend/static
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path backend\static | Out-Null
          Copy-Item -Recurse -Force frontend\dist\* backend\static\

      # ── Backend / PyInstaller ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        working-directory: backend
        run: pyinstaller app.spec --noconfirm

      # ── Upload ──────────────────────────────────────────────────────────────
      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: EYE-on-Claims-Windows
          path: backend/dist/EYE-on-Claims.exe
          retention-days: 30
